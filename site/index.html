<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SummerCamp 2026 学员宠物作品画廊">
    <title>SC26 宠物画廊</title>
    <link rel="stylesheet" href="styles.css?v=20260718-1">
    <script type="module" src="app.js?v=20260718-1"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./" aria-label="返回宠物画廊首页">
          <span class="brand-mark" aria-hidden="true">SC26</span>
          <span id="page-title">宠物画廊</span>
        </a>
        <a class="submit-button" id="submit-link" href="#" target="_blank" rel="noreferrer">
          提交我的宠物 <span aria-hidden="true">↗</span>
        </a>
      </div>
    </header>

    <main>
      <section class="gallery-heading" aria-labelledby="gallery-title">
        <div>
          <p class="eyebrow" id="event-name">SummerCamp 2026</p>
          <h1 id="gallery-title">大家的宠物</h1>
        </div>
        <p class="submission-count"><strong id="submission-count">0</strong> 份学员作品</p>
      </section>

      <section class="gallery-tools" id="gallery-tools" aria-label="筛选宠物作品">
        <div class="filter-fields">
          <label class="search-field" for="gallery-search">
            <span class="search-label">搜索宠物</span>
            <input
              id="gallery-search"
              type="search"
              placeholder="宠物名、作者、分组或介绍"
              autocomplete="off"
            >
          </label>
          <label class="group-field" for="group-filter">
            <span class="search-label">搜索分组</span>
            <input
              id="group-filter"
              type="search"
              list="group-suggestions"
              placeholder="选择或输入第 1-33 组"
              autocomplete="off"
            >
            <datalist id="group-suggestions"></datalist>
          </label>
        </div>
        <p class="result-summary" id="result-summary" aria-live="polite"></p>
      </section>

      <div class="status-message" id="status-message" role="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">正在叫醒宠物……</span>
      </div>

      <section aria-label="宠物作品">
        <div class="gallery-grid" id="gallery" aria-live="polite" aria-busy="true"></div>
        <p class="empty-results" id="empty-results" hidden>没有找到匹配的宠物。</p>
        <nav class="pagination" id="pagination" aria-label="画廊分页" hidden>
          <button class="page-arrow" id="previous-page" type="button" aria-label="上一页" title="上一页">←</button>
          <div class="page-numbers" id="page-numbers"></div>
          <button class="page-arrow" id="next-page" type="button" aria-label="下一页" title="下一页">→</button>
        </nav>
      </section>
    </main>

    <footer>
      <span>SC26 宠物画廊</span>
      <span id="updated-at"></span>
    </footer>

    <dialog class="detail-dialog" id="detail-dialog" aria-labelledby="detail-title">
      <button class="dialog-close" id="dialog-close" type="button" aria-label="关闭详情" title="关闭">×</button>
      <div class="detail-shell">
        <header class="detail-header">
          <p class="detail-kind" id="detail-kind"></p>
          <h2 id="detail-title"></h2>
          <p class="detail-author" id="detail-author"></p>
          <p class="detail-group" id="detail-group" hidden></p>
          <p class="detail-description" id="detail-description"></p>
        </header>

        <div class="state-viewer" id="state-viewer" hidden>
          <section class="active-state-panel" aria-labelledby="active-state-name">
            <div class="state-panel-heading">
              <div>
                <span class="state-eyebrow">当前状态</span>
                <h3 id="active-state-name"></h3>
              </div>
              <span class="frame-count" id="active-state-count"></span>
            </div>
            <div class="detail-preview" id="detail-preview"></div>
            <p class="active-state-description" id="active-state-description"></p>
          </section>
          <div class="state-list" id="state-list" aria-label="选择宠物状态"></div>
        </div>

        <div class="detail-links" id="detail-links"></div>
      </div>
    </dialog>

    <template id="pet-card-template">
      <button class="pet-card" type="button">
        <span class="pet-preview"></span>
        <span class="pet-body">
          <span class="pet-label"></span>
          <strong class="pet-name"></strong>
          <span class="pet-description"></span>
          <span class="pet-group" hidden></span>
          <span class="pet-byline"></span>
        </span>
      </button>
    </template>
  </body>
</html>
