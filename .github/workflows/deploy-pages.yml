name: Build and deploy gallery

on:
  issues:
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "scripts/**"
      - "lib/**"
      - "web/**"
      - "gallery.config.json"
      - "package.json"
      - "package-lock.json"

permissions:
  actions: write
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Restore generated preview cache
        uses: actions/cache@v6
        with:
          path: .gallery-cache
          key: gallery-previews-v3-${{ github.run_id }}
          restore-keys: |
            gallery-previews-v3-
            gallery-previews-v2-
            gallery-previews-v1-
      - name: Build gallery data
        run: node scripts/build-gallery-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Build frontend
        run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
